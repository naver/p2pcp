name: Release

on:
  release:
    types: [published]

jobs:
  download-ci-artifact:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Download CI artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: ci.yml
          commit: ${{ github.sha }}
          name: p2pcp-binary-${{ matrix.arch }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Re-upload CI artifact for use in this workflow
      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: p2pcp-binary-${{ matrix.arch }}
          path: p2pcp

  deploy:
    needs: [download-ci-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: p2pcp-binary-${{ matrix.arch }}

      - name: Set executable permission
        run: chmod +x p2pcp

      - name: Create release archive
        run: |
          RELEASE_VERSION=${{ github.event.release.tag_name }}
          PACKAGE_NAME="p2pcp-${RELEASE_VERSION}-linux-${{ matrix.arch }}"
          mkdir -p ${PACKAGE_NAME}
          cp p2pcp README.md LICENSE NOTICE ${PACKAGE_NAME}/
          tar czf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            p2pcp-${{ github.event.release.tag_name }}-linux-${{ matrix.arch }}.tar.gz \
            --repo ${{ github.repository }} \
            --clobber

  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.url=https://naver.github.io/p2pcp/

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.event.release.tag_name }}

  update-release-notes:
    needs: [deploy, build-and-push-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append container image and binary info to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(gh release view "$VERSION" --json body --jq .body --repo "$REPO")

          # Idempotent: skip if already updated
          if echo "$BODY" | grep -q "## Container Images"; then
            echo "Release notes already contain Container Images section. Skipping."
            exit 0
          fi

          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')

          {
            echo "$BODY"
            echo ""
            echo "## Container Images"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${REPO_LOWER}:${VERSION}"
            echo '```'
            echo ""
            echo "Supported platforms: \`linux/amd64\`, \`linux/arm64\`"
          } > /tmp/notes.md

          gh release edit "$VERSION" --notes-file /tmp/notes.md --repo "$REPO"
