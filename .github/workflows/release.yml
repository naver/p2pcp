name: Release

on:
  release:
    types: [published]

jobs:
  download-ci-artifact:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Download CI artifact
        uses: dawidd6/action-download-artifact@v14
        with:
          workflow: ci.yml
          commit: ${{ github.sha }}
          name: p2pcp-binary
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Re-upload CI artifact for use in this workflow
      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: p2pcp-binary
          path: p2pcp

  deploy:
    needs: [download-ci-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: p2pcp-binary

      - name: Set executable permission
        run: chmod +x p2pcp

      - name: Create release archive
        run: |
          RELEASE_VERSION=${{ github.event.release.tag_name }}
          PACKAGE_NAME="p2pcp-${RELEASE_VERSION}-linux-amd64"
          mkdir -p ${PACKAGE_NAME}
          cp p2pcp README.md LICENSE ${PACKAGE_NAME}/
          tar czf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            p2pcp-${{ github.event.release.tag_name }}-linux-amd64.tar.gz \
            --repo ${{ github.repository }} \
            --clobber
